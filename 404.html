<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/img/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: grid;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Batik Corner */
        .batik-corner {
            position: fixed;
            width: 120px;
            height: 120px;
            opacity: .18;
        }

        .tl {
            top: 0;
            left: 0;
        }

        .tr {
            top: 0;
            right: 0;
            transform: scaleX(-1);
        }

        .bl {
            bottom: 0;
            left: 0;
            transform: scaleY(-1);
        }

        .br {
            bottom: 0;
            right: 0;
            transform: scale(-1);
        }

        /* Floating flowers */
        .bunga {
            position: fixed;
            opacity: .6;
            animation: floatFlower 6s ease-in-out infinite;
        }

        @keyframes floatFlower {

            0%,
            100% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-14px) rotate(12deg);
            }
        }


        .card::before,
        .card::after {
            content: "";
            display: block;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg,
                    transparent,
                    #c9a227,
                    #e8d080,
                    #c9a227,
                    transparent);
        }

        .card::before {
            margin-bottom: 28px;
        }

        .card::after {
            margin-top: 28px;
        }

        .num404 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            color: #c9a227;
            font-weight: 700;
            letter-spacing: 6px;
            text-shadow: 0 2px 8px rgba(180, 130, 0, .25);
        }

        @keyframes floatImage {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            color: #8b5e0a;
            font-size: 1.55rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c9a227;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a227);
        }

        .divider span:last-child {
            background: linear-gradient(270deg, transparent, #c9a227);
        }

        .sub {
            color: #a07830;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg,
                    #c9a227,
                    #e8c84a,
                    #c9a227);
            color: white;
            padding: 14px 38px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            transition: .2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 18px;
            color: #bfa060;
            font-size: .85rem;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            .num404 {
                font-size: 3.8rem;
            }

            .pengantin {
                width: 150px;
            }

            .tagline {
                font-size: 1.2rem;
            }

            .btn {
                padding: 12px 28px;
                font-size: 0.95rem;
            }
        }

        .pengantin {
            width: min(200px, 60vw);
            display: block;
            margin: 12px auto 16px;
            animation: floatImage 4s ease-in-out infinite;
        }

        .card {
            width: min(92%, 560px);
            background: linear-gradient(160deg, #fff8e7, #fdf0d0);
            border: 2px solid #c9a227;
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(180, 130, 0, .18);
        }
    </style>
</head>

<body>

    <!-- Batik -->
    <svg class="batik-corner tl" viewBox="0 0 120 120">
        <path d="M0 0 Q60 0 120 60 Q60 60 0 120 Z" fill="#c9a227" />
    </svg>

    <svg class="batik-corner tr" viewBox="0 0 120 120">
        <path d="M0 0 Q60 0 120 60 Q60 60 0 120 Z" fill="#c9a227" />
    </svg>

    <svg class="batik-corner bl" viewBox="0 0 120 120">
        <path d="M0 0 Q60 0 120 60 Q60 60 0 120 Z" fill="#c9a227" />
    </svg>

    <svg class="batik-corner br" viewBox="0 0 120 120">
        <path d="M0 0 Q60 0 120 60 Q60 60 0 120 Z" fill="#c9a227" />
    </svg>

    <div class="bunga" style="top:18%;left:8%;">🌸</div>
    <div class="bunga" style="top:60%;left:5%;animation-delay:1s;">🌼</div>
    <div class="bunga" style="top:25%;right:7%;animation-delay:.5s;">🌺</div>
    <div class="bunga" style="top:70%;right:6%;animation-delay:2s;">🌸</div>

    <div class="card">

        <div class="num404">404</div>

        <img class="pengantin" src="assets/img/bg-404.png" alt="Pengantin Jawa">

        <div class="tagline">
            Sepertinya tidak ada pernikahan<br>
            di halaman ini…
        </div>

        <div class="divider">
            <span></span>❀<span></span>
        </div>

        <p class="sub">
            Halaman yang kamu cari sudah pergi bersama angin malam.<br>
            Mungkin sudah bersanding di pelaminan lain,
            atau belum hadir sama sekali. 😊
        </p>

        <div class="footer">
            Selamat menempuh hidup baru — tapi bukan di sini 🕊️
        </div>

    </div>

</body>

</html>
