<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }

    /* ===== Janur kuning (decorative palm leaf fronds) flanking the loader ===== */
    .janur {
      position: absolute;
      top: -90px;
      width: 70px;
      height: 260px;
      pointer-events: none;
      z-index: 2;
      transform-origin: top center;
    }

    .janur-left {
      left: -90px;
      animation: sway-left 3.5s ease-in-out infinite;
    }

    .janur-right {
      right: -90px;
      transform: scaleX(-1);
      animation: sway-right 3.5s ease-in-out infinite;
      animation-delay: -1.75s;
    }

    @keyframes sway-left {
      0%, 100% { transform: rotate(-3deg); }
      50%      { transform: rotate(3deg); }
    }

    @keyframes sway-right {
      0%, 100% { transform: scaleX(-1) rotate(-3deg); }
      50%      { transform: scaleX(-1) rotate(3deg); }
    }

    /* ===== Batik kawung background pattern (subtle, behind ring) ===== */
    .batik-bg {
      position: absolute;
      width: 320px;
      height: 320px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      opacity: 0.08;
      background-image:
        radial-gradient(circle at 25% 25%, #f5c400 0 12px, transparent 13px),
        radial-gradient(circle at 75% 25%, #f5c400 0 12px, transparent 13px),
        radial-gradient(circle at 25% 75%, #f5c400 0 12px, transparent 13px),
        radial-gradient(circle at 75% 75%, #f5c400 0 12px, transparent 13px),
        radial-gradient(circle at 50% 50%, #f5c400 0 12px, transparent 13px);
      background-size: 60px 60px;
      animation: spin 60s linear infinite;
      pointer-events: none;
    }

    .ring-outer {
      position: relative;
      width: 160px;
      height: 160px;
      z-index: 1;
    }

    /* Ring track recolored to gold/maroon (warna pengantin Jawa) */
    .ring-track {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        #f5c400 0deg,
        #c8860a 60deg,
        #7a1f1f 120deg,
        #3a0e0e 200deg,
        #1a1a1a 260deg,
        #1a1a1a 360deg
      );
      animation: spin 2s linear infinite;
    }

    .ring-center {
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a2a2a, #111 70%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Gunungan wayang silhouette in the center, gold line art */
    .gunungan {
      width: 58px;
      height: 58px;
      opacity: 0.9;
      animation: pulse 2s ease-in-out infinite;
    }

    .ring-sheen {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 30% 25%, rgba(255,210,50,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      letter-spacing: 0.18em;
      color: #c8a23a;
      animation: pulse 2s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    .dots {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      width: 0;
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { width: 0px; }
      25%  { width: 6px; }
      50%  { width: 12px; }
      75%  { width: 18px; }
      100% { width: 24px; }
    }
  </style>
</head>
<body>
  <div class="loader-wrap">
    <div class="batik-bg"></div>
    <div class="ring-outer">
      <div class="ring-track"></div>
      <div class="ring-center">
        <svg class="gunungan" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 5
                   C 35 5, 30 20, 35 28
                   C 25 30, 18 38, 18 48
                   C 18 58, 24 64, 24 64
                   L 14 78
                   C 12 82, 14 86, 18 86
                   L 82 86
                   C 86 86, 88 82, 86 78
                   L 76 64
                   C 76 64, 82 58, 82 48
                   C 82 38, 75 30, 65 28
                   C 70 20, 65 5, 50 5 Z"
                fill="none" stroke="#f5c400" stroke-width="1.5"/>
          <circle cx="50" cy="22" r="4" fill="none" stroke="#f5c400" stroke-width="1"/>
        </svg>
      </div>
      <div class="ring-sheen"></div>
    </div>
    <span class="loading-text">memuat<span class="dots">...</span></span>
  </div>
</body>
</html>
